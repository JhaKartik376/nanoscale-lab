services:
  backend:
    build: ./backend
    ports:
      - "8000:8000"
    environment:
      # optional: enables the Claude chat tutor; omit to use the rule-based fallback
      - ANTHROPIC_API_KEY=${ANTHROPIC_API_KEY:-}
    restart: unless-stopped

  frontend:
    build: ./frontend
    ports:
      - "5173:80"
    depends_on:
      - backend
    restart: unless-stopped
